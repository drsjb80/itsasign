<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Signage</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>
  <div id="ip-footer"></div>

  <script type="module">
    import { createCard, escapeHtml } from './widgets/utils.js';

    const DEFAULT_CONFIG_RELOAD_MS = 60 * 60 * 1000;
    let configReloadTimer = null;

    function scheduleConfigReload(intervalMs = DEFAULT_CONFIG_RELOAD_MS) {
      const safeInterval = Number.isFinite(intervalMs) && intervalMs > 0
        ? intervalMs
        : DEFAULT_CONFIG_RELOAD_MS;

      if (configReloadTimer) {
        clearInterval(configReloadTimer);
      }

      configReloadTimer = setInterval(() => {
        window.location.reload();
      }, safeInterval);
    }

    async function main() {
      const config = await loadJson('config.json');
      scheduleConfigReload(Number(config.reloadConfigMs) || DEFAULT_CONFIG_RELOAD_MS);
      const plugins = await loadPlugins(config.plugins || []);
      renderApp(config, plugins);
    }

    async function loadPlugins(paths) {
      const modules = await Promise.all(paths.map(p => import(p)));
      return new Map(modules.map(m => [m.type, m]));
    }

    async function loadJson(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`Could not load ${path}`);
      }
      return response.json();
    }

    function renderApp(config, plugins) {
      const app = document.getElementById('app');
      app.style.gridTemplateColumns = config.layout?.columns || '2fr 1fr';
      app.style.gridTemplateRows = config.layout?.rows || '1fr';

      const panels = (config.panels || []).filter(p => {
        if (p.className === 'header-strip' && !config.headerEnabled) return false;
        return true;
      });

      for (const panel of panels) {
        const panelEl = document.createElement('section');
        panelEl.className = 'panel';
        if (panel.className) {
          panelEl.classList.add(panel.className);
        }
        if (panel.gridArea) panelEl.style.gridArea = panel.gridArea;

        if (panel.title) {
          const header = document.createElement('div');
          header.className = 'panel-header';
          header.textContent = panel.title;
          panelEl.appendChild(header);
        }

        const body = document.createElement('div');
        body.className = 'panel-body';
        panelEl.appendChild(body);

        for (const widget of panel.widgets || []) {
          body.appendChild(createWidget(widget, config, plugins));
        }

        app.appendChild(panelEl);
      }
    }

    function createWidget(widget, config, plugins) {
      const plugin = plugins.get(widget.type);
      if (plugin) return plugin.create(widget, config);
      return createUnknownWidget(widget);
    }

    function createUnknownWidget(widget) {
      const el = createCard(widget.title || widget.type || 'Unknown');
      const msg = document.createElement('div');
      msg.className = 'error';
      msg.textContent = `Unknown widget type: ${widget.type}`;
      el.appendChild(msg);
      return el;
    }

    scheduleConfigReload();

    main().catch(error => {
      document.getElementById('app').innerHTML = `<pre style="padding:16px;white-space:pre-wrap;">${escapeHtml(error.message)}</pre>`;
      console.error(error);
    });

    // Fetch and display local IP from the CORS proxy server.
    (async function loadIp() {
      const footer = document.getElementById('ip-footer');
      try {
        const res = await fetch('http://localhost:8080/ip');
        if (!res.ok) throw new Error('no response');
        const data = await res.json();
        footer.textContent = data.ip;
      } catch {
        footer.textContent = '';
      }
    })();
  </script>
</body>
</html>
